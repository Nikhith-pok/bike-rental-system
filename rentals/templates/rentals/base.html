<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedy Bike Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #f8f9fa; }
        .navbar { box-shadow: 0 2px 4px rgba(0,0,0,.1); }
        .nav-link { font-weight: 500; }
        /* Ensure dropdowns don't get hidden behind other elements */
        .dropdown-menu { z-index: 1021; }
    </style>
</head>
<body>

    {% if user.is_authenticated %}
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}">
                <i class="fas fa-motorcycle text-warning"></i> SpeedyRentals
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    
                    <li class="nav-item">
                        <a class="nav-link me-3" href="{% url 'index' %}">Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link me-3" href="{% url 'my_rentals' %}">
                            <i class="fas fa-key"></i> My Rentals
                        </a>
                    </li>
                    
                    {% if user.is_staff %}
                    <li class="nav-item">
                        <a class="nav-link me-3" href="{% url 'dashboard' %}">
                            <i class="fas fa-chart-bar"></i> Dashboard
                        </a>
                    </li>
                    {% endif %}

                    <li class="nav-item">
                        <a class="nav-link me-3" href="{% url 'index' %}">
                            <i class="fas fa-plus-circle"></i> New Booking
                        </a>
                    </li>

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle btn btn-outline-secondary border-0 text-white" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle fa-lg me-1"></i> {{ user.first_name }}
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow">
                            <li><span class="dropdown-item-text text-muted">Signed in as <strong>{{ user.username }}</strong></span></li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form action="{% url 'logout' %}" method="post">
                                    {% csrf_token %}
                                    <button type="submit" class="dropdown-item text-danger">
                                        <i class="fas fa-sign-out-alt me-2"></i> Logout
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    {% endif %}
    
    <div class="{% if user.is_authenticated %}container mt-4{% else %}container-fluid p-0{% endif %}">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
